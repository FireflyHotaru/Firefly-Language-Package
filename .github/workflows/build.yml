name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack files
        run: zip -r Firefly-Language-Package.zip assets pack.mcmeta pack.png

      - name: Unzip file
        run: unzip -q Firefly-Language-Package.zip -d pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firefly-Language-Package
          path: pack/*